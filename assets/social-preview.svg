<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Microsoft Security Skills">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E2A4A"/>
      <stop offset="0.55" stop-color="#0A1D38"/>
      <stop offset="1" stop-color="#050E1E"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#50E6FF"/>
      <stop offset="1" stop-color="#2BB9E0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.32" r="0.55">
      <stop offset="0" stop-color="#50E6FF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#50E6FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- bottom accent strip (GitHub-card style) -->
  <rect x="0" y="632" width="1280" height="8" fill="url(#cyan)"/>

  <!-- faint grid dots -->
  <g fill="#50E6FF" fill-opacity="0.05">
    <circle cx="980" cy="120" r="2.5"/><circle cx="1040" cy="120" r="2.5"/><circle cx="1100" cy="120" r="2.5"/><circle cx="1160" cy="120" r="2.5"/>
    <circle cx="980" cy="180" r="2.5"/><circle cx="1040" cy="180" r="2.5"/><circle cx="1100" cy="180" r="2.5"/><circle cx="1160" cy="180" r="2.5"/>
  </g>

  <!-- four-square mark + owner/repo line -->
  <g transform="translate(96, 110)">
    <rect x="0"  y="0"  width="30" height="30" rx="3" fill="#50E6FF"/>
    <rect x="36" y="0"  width="30" height="30" rx="3" fill="#9FE9F7"/>
    <rect x="0"  y="36" width="30" height="30" rx="3" fill="#3BA9CC"/>
    <rect x="36" y="36" width="30" height="30" rx="3" fill="#6FD6EC"/>
    <text x="88" y="48" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="30" font-weight="400" fill="#9FB4CC">vinayaklatthe<tspan font-weight="700" fill="#E8F4FA"> / microsoft-security-skills</tspan></text>
  </g>

  <!-- headline -->
  <text x="96" y="290" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="78" font-weight="700" fill="#FFFFFF">Security Skills for</text>
  <text x="96" y="380" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="78" font-weight="700" fill="#FFFFFF">AI Agents</text>

  <!-- subtitle -->
  <text x="96" y="440" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="30" font-weight="400" fill="#9FB4CC">58 curated skills - decision trees, workflows, guardrails - grounded in Microsoft Learn</text>

  <!-- chips -->
  <g font-family="Segoe UI, Inter, Arial, sans-serif" font-size="24" font-weight="600">
    <rect x="96"  y="486" width="150" height="50" rx="25" fill="#50E6FF" fill-opacity="0.12" stroke="#50E6FF" stroke-opacity="0.5"/>
    <text x="171" y="519" fill="#50E6FF" text-anchor="middle">58 Skills</text>

    <rect x="262" y="486" width="296" height="50" rx="25" fill="#0A2540" stroke="#50E6FF" stroke-opacity="0.35"/>
    <text x="410" y="519" fill="#CFE9F5" text-anchor="middle">Defender . Sentinel . Entra</text>

    <rect x="574" y="486" width="296" height="50" rx="25" fill="#0A2540" stroke="#50E6FF" stroke-opacity="0.35"/>
    <text x="722" y="519" fill="#CFE9F5" text-anchor="middle">Purview . Intune . Copilot</text>

    <rect x="886" y="486" width="160" height="50" rx="25" fill="#0A2540" stroke="#50E6FF" stroke-opacity="0.35"/>
    <text x="966" y="519" fill="#CFE9F5" text-anchor="middle">Zero Trust</text>
  </g>

  <!-- shield glyph -->
  <g transform="translate(1000, 96)">
    <path d="M104 6 L192 36 V108 C192 170 152 206 104 222 C56 206 16 170 16 108 V36 Z"
          fill="#0A2540" stroke="#50E6FF" stroke-width="3.5" stroke-opacity="0.85"/>
    <path d="M64 110 L94 140 L148 78" fill="none" stroke="#50E6FF" stroke-width="11"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- watermark -->
  <text x="1184" y="600" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="20" fill="#5C7A99" text-anchor="end">Vinayak Latthe . MIT licensed</text>
</svg>
