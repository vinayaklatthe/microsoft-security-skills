<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="microsoft-security-skills">
  <!-- clean white GitHub-card background -->
  <rect width="1280" height="340" fill="#FFFFFF"/>
  <rect x="1" y="1" width="1278" height="338" fill="none" stroke="#D8DEE4" stroke-width="2"/>

  <!-- owner / repo heading -->
  <text x="80" y="118" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="40" font-weight="400" fill="#57606A" xml:space="preserve">vinayaklatthe&#160;/&#160;<tspan font-weight="700" fill="#1F2328">microsoft-security-skills</tspan></text>

  <!-- description -->
  <text x="80" y="170" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="26" font-weight="400" fill="#57606A">56 Microsoft Security skills for AI agents - Defender, Sentinel, Entra,</text>
  <text x="80" y="206" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="26" font-weight="400" fill="#57606A">Purview, Intune, and Security Copilot.</text>

  <!-- value stats -->
  <g>
    <text x="82"  y="270" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1F2328">56</text>
    <text x="82"  y="298" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="400" fill="#57606A">Skills</text>

    <text x="200" y="270" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1F2328">6</text>
    <text x="200" y="298" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="400" fill="#57606A">Product areas</text>

    <text x="400" y="270" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1F2328">5</text>
    <text x="400" y="298" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="400" fill="#57606A">Agent hosts</text>

    <text x="566" y="270" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1F2328">MIT</text>
    <text x="566" y="298" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="400" fill="#57606A">Licensed</text>
  </g>

  <!-- Microsoft-style four-square mark (right) -->
  <g transform="translate(1084, 110)">
    <rect x="0"  y="0"  width="58" height="58" fill="#F25022"/>
    <rect x="64" y="0"  width="58" height="58" fill="#7FBA00"/>
    <rect x="0"  y="64" width="58" height="58" fill="#00A4EF"/>
    <rect x="64" y="64" width="58" height="58" fill="#FFB900"/>
  </g>
</svg>
